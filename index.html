<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deli Plus</title>
    <!-- favicon  -->
    <link rel="icon" type="image/x-icon" href="./src/assets/images/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sansita+Swashed:wght@300..900&display=swap" rel="stylesheet">
    <!-- Preload Images  -->
    <link rel="preload" href="./src/assets/images/bg_sandwich.jpg" as="image">
    <link rel="preload" href="./src/assets/images/white-texture.jpg" as="image">
    <link rel="preload" href="./src/assets/images/popular/burger.webp" as="image">
    <link rel="preload" href="./src/assets/images/popular/1.webp" as="image">
    <link rel="preload" href="./src/assets/images/popular/2.webp" as="image">
    <link rel="preload" href="./src/assets/images/popular/3.webp" as="image">
    <link rel="preload" href="./src/assets/images/popular/4.webp" as="image">
    <link rel="preload" href="./src/assets/images/popular/5.webp" as="image">
    <link rel="preload" href="./src/assets/images/popular/6.webp" as="image">
    <link rel="preload" href="./src/assets/images/popular/7.webp" as="image">
    <link rel="preload" href="./src/assets/images/popular/8.webp" as="image">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="navbar">
        <div class="nav-left">
            <img src="./src/assets/images/logo.svg" alt="">
        </div>
        <div class="nav-right">
            <li><a class="link active" href="/">Home</a></li>
            <li><a class="link" href="#">Menu</a></li>
            <li><a class="link" href="#">Gallery</a></li>
            <li><a class="link" href="#">Contact</a></li>
        </div>
        <div class="nav-mobile-right">
            <button>
                <i class="ri-menu-line"></i>
            </button>
        </div>
    </div>

    <!-- Click To Top Button -->
    <a href="#home" class="click-to-top">
        <i class="ri-arrow-up-line"></i>
    </a>

    <!-- Loader -->
    <div class="loader">
        <img src="./src/assets/images/logo.svg" alt="">
        <div class="line"></div>
    </div>

    <!-- Main Section  -->
    <main>
        <!-- Page 1 -->
        <section id="home" class="home-section">
            <div class="home-content">
                <div class="background">
                    <img src="./src/assets/images/bg_sandwich.jpg" alt="background">
                </div>
                <div class="foreground">
                    <div class="content">
                        <div class="content-left">
                            <p>Delicious Cafe</p>
                            <h1>Sweet Treats</h1>
                            <h1>Perfact Eats</h1>
                            <button class="popular-products">Popular Recipies &nbsp; &rarr;</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Page 2 -->
        <section class="top-products">
            <div class="top-products-container">
                <div class="heading">
                    <h1>Delicious</h1>
                </div>

                <div class="products">
                    <div class="product">
                        <img src="./src/assets/images/popular/burger.webp" alt="">
                    </div>
                </div>

        </section>

        


        <footer>
            <div class="footer-content">
                <p>© 2025 Deli Plus. All rights reserved | Designed and developed by <span class="timestech">Timestech
                        Softwares</span></p>
            </div>
        </footer>
    </main>

    <script src="./index.js"></script>
</body>

</html>
